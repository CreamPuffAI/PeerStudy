services:
  backend:
    image: ghcr.io/${GHCR_NAMESPACE:-creampuffai}/peerstudy-backend:${PEERSTUDY_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      FPT_AI_API_KEY: ${FPT_AI_API_KEY:-}
      FPT_AI_MODEL: ${FPT_AI_MODEL:-}
      FPT_AI_BASE_URL: ${FPT_AI_BASE_URL:-https://mkp-api.fptcloud.com/chat/completions}
      FPT_AI_STREAM: ${FPT_AI_STREAM:-true}
      FPT_AI_TIMEOUT_SECONDS: ${FPT_AI_TIMEOUT_SECONDS:-8}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    image: ghcr.io/${GHCR_NAMESPACE:-creampuffai}/peerstudy-frontend:${PEERSTUDY_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PEERSTUDY_HTTP_PORT:-80}:80"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  watchtower:
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    command: --label-enable --cleanup --interval ${WATCHTOWER_INTERVAL:-300}
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_CONFIG_FILE:-/root/.docker/config.json}:/config.json:ro
    labels:
      com.centurylinklabs.watchtower.enable: "false"

